    - data:
        code: "import json\nimport re\nfrom typing import Any, Dict, List\n\n\nALLOWED_MARK_RE\
          \ = re.compile(r\"^(✓|N/A|U[1-9]\\d*)$\")\n\n\ndef parse_input(data: Any)\
          \ -> Dict[str, Any]:\n    if isinstance(data, dict):\n        return data\n\
          \    if isinstance(data, str):\n        data = data.strip()\n        if\
          \ not data:\n            return {}\n        return json.loads(data)\n  \
          \  raise ValueError(\"structured_json must be a JSON string or dict\")\n\
          \n\ndef s(value: Any) -> str:\n    return \"\" if value is None else str(value).strip()\n\
          \n\ndef normalize_text(value: Any) -> str:\n    text = s(value)\n    return\
          \ text\n\n\ndef normalize_mark(value: Any, field_name: str) -> Any:\n  \
          \  text = s(value)\n\n    if text == \"√\":\n        text = \"✓\"\n\n  \
          \  if not text:\n        raise ValueError(f\"Judgement cell '{field_name}'\
          \ is empty. Allowed values: ✓ / N/A / U1, U2, ...\")\n\n    if not ALLOWED_MARK_RE.match(text):\n\
          \        raise ValueError(\n            f\"Invalid judgement mark in '{field_name}':\
          \ {text}. \"\n            \"Allowed values: ✓ / N/A / U1, U2, ...\"\n  \
          \      )\n\n    m = re.match(r\"^U([1-9]\\d*)$\", text)\n    if m:\n   \
          \     return {\n            \"symbol\": \"U\",\n            \"footnote_ref\"\
          : m.group(1),\n            \"display\": text\n        }\n\n    return text\n\
          \n\ndef clean_issue_text(text: Any) -> str:\n    return s(text)\n\n\ndef\
          \ extract_issues(data: Dict[str, Any]) -> List[str]:\n    issues: List[str]\
          \ = []\n    used_ids = set()\n\n    for item in data.get(\"footnotes\",\
          \ []) or []:\n        if not isinstance(item, dict):\n            continue\n\
          \        fid = s(item.get(\"id\"))\n        txt = clean_issue_text(item.get(\"\
          text\"))\n        if not fid or not txt:\n            continue\n       \
          \ if fid in used_ids:\n            continue\n        used_ids.add(fid)\n\
          \        issues.append(txt)\n\n    return issues\n\n\ndef main(structured_json:\
          \ Any) -> Dict[str, Any]:\n    data = parse_input(structured_json)\n   \
          \ rows = data.get(\"rows\", []) or []\n    row = rows[0] if rows else {}\n\
          \n    field_map = {\n        \"objectives\": \"objectives_cell\",\n    \
          \    \"demonstrated_need\": \"demonstrated_need_cell\",\n        \"categories_of_ships\"\
          : \"categories_of_ships_cell\",\n        \"traffic_characteristics_environment_aspects\"\
          : \"traffic_characteristics_cell\",\n        \"geographical_coverage\":\
          \ \"geographical_coverage_cell\",\n        \"appropriate_chartlet\": \"\
          appropriate_chartlet_cell\",\n        \"content_essential_for_achieving_objectives\"\
          : \"content_essential_cell\",\n        \"report_timing\": \"report_timing_cell\"\
          ,\n        \"information_to_be_provided_to_ships_procedures\": \"information_to_be_provided_cell\"\
          ,\n        \"communication_requirements\": \"communication_requirements_cell\"\
          ,\n        \"rules_and_regulations_in_force\": \"rules_and_regulations_cell\"\
          ,\n        \"shore_based_facilities\": \"shore_based_facilities_cell\",\n\
          \        \"existing_measures_why_inadequate\": \"existing_measures_cell\"\
          ,\n        \"backup_procedures\": \"backup_procedures_cell\",\n        \"\
          emergency_plan\": \"emergency_plan_cell\",\n        \"measures_for_non_compliance\"\
          : \"non_compliance_cell\",\n        \"implementation_date\": \"implementation_date_cell\"\
          ,\n        \"correct_reporting_format\": \"correct_reporting_format_cell\"\
          ,\n        \"reference_to_relevant_data_exchange_standard\": \"data_exchange_standard_cell\"\
          ,\n        \"cyber_risk_management_guidelines\": \"cyber_risk_cell\",\n\
