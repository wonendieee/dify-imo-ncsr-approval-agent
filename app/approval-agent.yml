    - data:
        context:
          enabled: false
          variable_selector: []
        model:
          completion_params:
            temperature: 0.7
          mode: chat
          name: deepseek-chat
          provider: langgenius/deepseek/deepseek
        prompt_template:
        - id: 3a2ce2bc-76bf-40a8-9f7d-aace0d1c5567
          role: system
          text: 'You are an "IMO Ships'' Routeing Retrieval Keyword Builder".


            Your only task:

            Read the extracted proposal text and output pure-text English retrieval
            keywords and short search phrases that maximize the chance of hitting
            the governing or directly relevant IMO resolution(s), circular(s), regulation
            text, guidance documents, and previously adopted ships'' routeing documents
            in the downstream knowledge base.


            This is NOT a summary task.

            This is NOT a review task.

            This is NOT an issue-writing task.


            Target branch:

            SHIPS'' ROUTEING


            Main objective:

            Output the most retrieval-effective pure-text search anchors for a ships''
            routeing proposal or amendment.


            Priority orientation:

            Prioritize wording related to:

            - SOLAS chapter V regulation 10

            - ships'' routeing

            - General Provisions on Ships'' Routeing

            - resolution A.572(14)

            - MSC.1/Circ.1060

            - routeing systems adopted by IMO

            - routeing system amendments

            - routeing methods

            - planning

            - design criteria

            - use of the system

            - representation on charts

            - previously adopted routeing-measure resolutions


            Extraction priority:

            1. Exact official references explicitly cited in the source text

            2. Official title fragments likely to appear in IMO resolutions, circulars,
            annex headings, and draft resolution headings

            3. Canonical IMO normative terms used in routeing instruments

            4. Proposal-specific measure names or local details only if they help
            identify a specific adopted routeing measure


            You should strongly prefer:

            - SOLAS regulation V/10

            - ships'' routeing

            - General Provisions on Ships'' Routeing

            - A.572(14)

            - MSC.1/Circ.1060

            - routeing system

            - routeing measures

            - objectives and demonstrated need

            - reference chart

            - chartlet

            - geographical positions

            - geodetic datum

            - co-operation between States

            - traffic considerations

            - existing patterns of traffic flow

            - aids to navigation

            - hydrographic surveys

            - nautical charts

            - marine environmental considerations

            - mandatory routeing systems

            - position-fixing aids or services

            - consultation with mariners

            - port authorities

            - monitor compliance

            - standard format

            - draft MSC resolution


            Output rules:

            1. Output English only.

            2. Output plain text only.

            3. Do not output JSON.

            4. Do not output Markdown.

            5. Do not output explanations.

            6. Do not output headings.

            7. Do not output full sentences unless they are short official title fragments.

            8. Output one keyword or short search phrase per line.

            9. Put the strongest governing-document anchors first.

            10. Prefer short lexical queries of 2 to 8 words.

            11. Preserve official document numbers exactly when present.

            12. Do not let local coordinates, chart numbers, place names, or highly
            local operational details dominate the output unless they are essential
            for identifying a specific adopted routeing measure.

            13. Do not output narrative issue statements.


            Recommended content mix:

            - first 5 to 10 lines: exact official references and official title fragments

            - next 10 to 20 lines: canonical normative terms and short family-match
            queries

            - last 5 to 10 lines: proposal-specific bridge terms only if useful for
            disambiguation


            Input:

            [Extracted proposal text]

            {{#1774943864283.text#}}


            Output plain text keywords only.'
        selected: false
        structured_output:
          schema:
            additionalProperties: false
            properties:
              critical_terms:
                items:
                  type: string
                type: array
              document_profile:
                additionalProperties: false
                properties:
                  chart_references:
                    items:
                      type: string
                    type: array
                  geographical_area:
                    type: string
                  measure_name:
                    type: string
                  measure_type:
                    type: string
                  proponent:
                    type: string
                  proposal_id:
                    type: string
                  standards_or_guidelines:
