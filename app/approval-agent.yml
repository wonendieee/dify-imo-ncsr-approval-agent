    - data:
        code: "import json\nimport re\nfrom typing import Any, Dict, List\n\n\nALLOWED_MARK_RE\
          \ = re.compile(r\"^(✓|N/A|U[1-9]\\d*)$\")\n\n\ndef parse_input(data: Any)\
          \ -> Dict[str, Any]:\n    if isinstance(data, dict):\n        return data\n\
          \    if isinstance(data, str):\n        data = data.strip()\n        if\
          \ not data:\n            return {}\n        return json.loads(data)\n  \
          \  raise ValueError(\"structured_json must be a JSON string or dict\")\n\
          \n\ndef s(value: Any) -> str:\n    return \"\" if value is None else str(value).strip()\n\
          \n\ndef normalize_text(value: Any) -> str:\n    return s(value)\n\n\ndef\
          \ normalize_mark(value: Any, field_name: str) -> Any:\n    text = s(value)\n\
          \n    if text == \"√\":\n        text = \"✓\"\n\n    if not text:\n    \
          \    raise ValueError(f\"Judgement cell '{field_name}' is empty. Allowed\
          \ values: ✓ / N/A / U1, U2, ...\")\n\n    if not ALLOWED_MARK_RE.match(text):\n\
          \        raise ValueError(\n            f\"Invalid judgement mark in '{field_name}':\
          \ {text}. \"\n            \"Allowed values: ✓ / N/A / U1, U2, ...\"\n  \
          \      )\n\n    m = re.match(r\"^U([1-9]\\d*)$\", text)\n    if m:\n   \
          \     return {\n            \"symbol\": \"U\",\n            \"footnote_ref\"\
          : m.group(1),\n            \"display\": text\n        }\n\n    return text\n\
          \n\ndef clean_issue_text(text: Any) -> str:\n    return s(text)\n\n\ndef\
          \ extract_issues(data: Dict[str, Any]) -> List[str]:\n    issues: List[str]\
          \ = []\n    used_ids = set()\n\n    for item in data.get(\"footnotes\",\
          \ []) or []:\n        if not isinstance(item, dict):\n            continue\n\
          \        fid = s(item.get(\"id\"))\n        txt = clean_issue_text(item.get(\"\
          text\"))\n        if not fid or not txt:\n            continue\n       \
          \ if fid in used_ids:\n            continue\n        used_ids.add(fid)\n\
          \        issues.append(txt)\n\n    return issues\n\n\ndef main(structured_json:\
          \ Any) -> Dict[str, Any]:\n    data = parse_input(structured_json)\n   \
          \ rows = data.get(\"rows\", []) or []\n    row = rows[0] if rows else {}\n\
          \n    field_map = {\n        \"objectives\": \"objectives_cell\",\n    \
          \    \"demonstrated_need\": \"demonstrated_need_cell\",\n        \"reason_for_proposal_preferred\"\
          : \"Reason_for_proposal_preferred_cell\",\n        \"history_of_incidents\"\
          : \"history_of_incidents_cell\",\n        \"applicability\": \"applicability_cell\"\
          ,\n        \"impact_on_shipping\": \"impact_on_shipping_cell\",\n      \
          \  \"location_positions\": \"location_cell\",\n        \"reference_chart_details\"\
          : \"reference_chart_details_cell\",\n        \"chartlet_appropriate_one\"\
          : \"chartlet_cell\",\n        \"cooperation_between_states\": \"cooperation_between_states_cell\"\
          ,\n        \"following_existing_traffic_patterns\": \"following_existing_traffic_patterns_cell\"\
          ,\n        \"aids_to_navigation\": \"aids_to_navigation_cell\",\n      \
          \  \"information_on_traffic_patterns\": \"information_on_traffic_patterns_cell\"\
          ,\n        \"hydrographic_surveys_and_charts_adequacy\": \"surveys_and_charts_cell\"\
          ,\n        \"alternative_measure\": \"alternative_measure_cell\",\n    \
          \    \"offshore_structures\": \"offshore_structures_cell\",\n        \"\
          environmental_factors\": \"environmental_factors_cell\",\n        \"prevent_reduce_risk\"\
          : \"risk_cell\",\n        \"sufficient_justification\": \"sufficient_justification_cell\"\
          ,\n        \"adverse_effect_to_ports_and_harbours_including_tss\": \"adverse_effect_cell\"\
          ,\n        \"limited_to_what_is_essential\": \"essential_limit_cell\",\n\
          \        \"aids_or_services\": \"aids_or_services_cell\",\n        \"fishing_ground_activities_and_foreseeable_changes_in_traffic_pattern\"\
          : \"changes_in_traffic_pattern_cell\",\n        \"other_measures_taken\"\
          : \"other_measures_taken_cell\",\n        \"consultations_with_mariners_and_other_users\"\
          : \"consultations_cell\",\n        \"monitoring_compliance_and_actions_taken\"\
          : \"monitoring_compliance_and_actions_taken_cell\",\n        \"correct_format_for_description_of_proposed_system_gpsr\"\
          : \"correct_format_Cell\",\n        \"adherence_to_other_guidance_only_if_observed_msc_1_circ_1060\"\
          : \"adherence_cell\"\n    }\n\n    named_cells = {\n        \"title_cell\"\
          : normalize_text(data.get(\"title\")),\n        \"subtitle_cell\": normalize_text(data.get(\"\
          subtitle\")),\n        \"document_label_cell\": normalize_text(row.get(\"\
          document_proponent\")),\n        \"context_description_cell\": normalize_text(row.get(\"\
          remarks\"))\n    }\n\n    for src_key, target_name in field_map.items():\n\
          \        named_cells[target_name] = normalize_mark(row.get(src_key), src_key)\n\
          \n    payload = {\n        \"named_cells\": named_cells,\n        \"issues\"\
          : extract_issues(data),\n        \"output_filename\": \"proposed_ship_routeing_systems_result\"\
          \n    }\n\n    return {\n        \"payload_json\": json.dumps(payload, ensure_ascii=False),\n\
          \        \"builtin_template_key\": \"proposed_ship_routeing_systems\",\n\
          \        \"document_label\": normalize_text(row.get(\"document_proponent\"\
          )),\n        \"issue_count\": len(payload[\"issues\"])\n    }"
        code_language: python3
